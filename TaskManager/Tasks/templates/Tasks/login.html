{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="glass-card" style="width: 400px;">

        <h3 class="text-center mb-2">🔐 Login</h3>
        <p class="text-center mb-4" style="opacity: 0.8;">Welcome back</p>

        <form method="POST">
            {% csrf_token %}

            <!-- Username -->
            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" class="glass-input" placeholder="Enter username" required>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label>Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" name="password" class="glass-input" placeholder="Enter password" required>

                    <!-- 👁 Show/Hide -->
                    <span onclick="togglePassword()" 
                          style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer;">
                        👁
                    </span>
                </div>
            </div>

            <!-- Remember me -->
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label">Remember me</label>
            </div>

            <!-- Button -->
            <button type="submit" class="btn-gradient w-100">
                Login
            </button>

        </form>

        <!-- Error -->
        {% if form.errors %}
            <div class="mt-3 text-danger text-center">
                ❌ Invalid username or password
            </div>
        {% endif %}

        <!-- Signup -->
        <p class="text-center mt-3">
            Don’t have an account?
            <a href="{% url 'signup' %}" style="color: #fff; text-decoration: underline;">
                Sign up
            </a>
        </p>

    </div>

</div>

<!-- 👁 PASSWORD TOGGLE SCRIPT -->
<script>
function togglePassword() {
    let input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}
</script>

{% endblock %}
